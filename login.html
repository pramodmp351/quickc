<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --purple-bg: linear-gradient(180deg, #5e0d8b 0%, #3a0b5a 100%);
        --pink-btn: #c81e61;
        --pink-hover: #b01a55;
        --text-white: #ffffff;
        --input-bg: #ffffff;
        --right-bg: #f9f9f9;
        --terms-link: #ff60a8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Outfit", "Inter", sans-serif;
      }

      body {
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        /* Mobile padding ensures the modal doesn't hit screen edges */
        padding: 16px;
      }

      /* Modal Container */
      .modal {
        background: white;
        width: 100%;
        max-width: 850px;
        /* Removed fixed height for responsiveness */
        min-height: 520px;
        display: flex;
        flex-direction: row;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      /* Left Section (The main interaction area) */
      .left-section {
        background: var(--purple-bg);
        flex: 1.2;
        padding: 48px;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .brand-name {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -1.5px;
        margin-bottom: 24px;
        line-height: 1;
      }

      .hero-text {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 32px;
      }

      .input-container {
        width: 100%;
        margin-bottom: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .input-group {
        background: var(--input-bg);
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 0 20px;
        height: 60px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .input-label-area {
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #1a1a1a;
        font-size: 15px;
        white-space: nowrap;
        padding-right: 15px;
        border-right: 1px solid #eee;
        margin-right: 15px;
      }

      .field-input {
        border: none;
        outline: none;
        width: 100%;
        font-size: 16px;
        color: #333;
        font-weight: 500;
        background: transparent;
      }

      .continue-btn {
        background: var(--pink-btn);
        color: white;
        border: none;
        border-radius: 12px;
        width: 100%;
        height: 60px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 8px;
        box-shadow: 0 10px 15px -3px rgba(200, 30, 97, 0.3);
      }

      .continue-btn:hover {
        background: var(--pink-hover);
        transform: translateY(-1px);
      }

      .continue-btn:active {
        transform: translateY(0);
      }

      .login-prompt {
        text-align: center;
        margin-top: 24px;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.8);
      }

      .login-prompt a {
        color: var(--terms-link);
        text-decoration: none;
        font-weight: 700;
        margin-left: 4px;
      }

      .terms-text {
        font-size: 12px;
        text-align: center;
        line-height: 1.6;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 32px;
      }

      .terms-text a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: underline;
      }

      /* Right Section */
      .right-section {
        background: var(--right-bg);
        flex: 0.8;
        padding: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-left: 1px solid #f0f0f0;
      }

      .illustration-container {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 32px;
      }

      .illustration-circle {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 2px dashed #ddd;
        border-radius: 50%;
        animation: rotate 20s linear infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .phone-mockup {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 44px;
        height: 80px;
        background: #3a0b5a;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .phone-mockup::after {
        content: "S";
        color: white;
        font-weight: 900;
        font-size: 20px;
      }

      .right-heading {
        font-size: 22px;
        font-weight: 700;
        color: #310c55;
        text-align: center;
        margin-bottom: 8px;
        line-height: 1.3;
      }

      .right-subtext {
        font-size: 15px;
        color: #666;
        text-align: center;
        margin-bottom: 32px;
      }

      .store-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 200px;
      }

      .store-btn {
        background: #000;
        border-radius: 8px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: white;
        transition: opacity 0.2s;
        font-weight: 600;
        font-size: 14px;
        gap: 10px;
      }

      .store-btn:hover {
        opacity: 0.8;
      }

      #error-msg {
        color: #ff9dbd;
        font-size: 13px;
        font-weight: 600;
        margin-top: -8px;
        margin-bottom: 8px;
        display: none;
      }

      /* Mobile Responsive Overrides */
      @media (max-width: 768px) {
        body {
          padding: 0;
          align-items: flex-start; /* Better for scrolling if content is long */
        }

        .modal {
          flex-direction: column;
          border-radius: 0;
          min-height: 100vh;
          box-shadow: none;
        }

        .left-section {
          padding: 40px 24px;
          flex: none;
        }

        .brand-name {
          font-size: 32px;
          text-align: center;
        }

        .hero-text {
          font-size: 24px;
          text-align: center;
        }

        .right-section {
          flex: none;
          padding: 40px 24px;
          border-left: none;
          border-top: 1px solid #eee;
          background: #fff;
        }

        .store-buttons {
          flex-direction: row;
          max-width: 100%;
        }

        .store-btn {
          flex: 1;
          padding: 10px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="modal">
      <!-- Left Section -->
      <div class="left-section">
        <div class="brand-name">STACKLY</div>

        <div class="content-body">
          <h1 class="hero-text">Lowest Prices Everyday<br />in minutes</h1>

          <div class="input-container">
            <!-- Phone Input -->
            <div class="input-group">
              <div class="input-label-area">IN +91</div>
              <input
                type="tel"
                id="phone"
                class="field-input"
                placeholder="Phone Number"
                maxlength="10"
                inputmode="numeric"
              />
            </div>

            <!-- Password Input -->
            <div class="input-group">
              <div class="input-label-area">🔑</div>
              <input
                type="password"
                id="password"
                class="field-input"
                placeholder="Password"
              />
            </div>

            <div id="error-msg">Please check your login details</div>
          </div>

          <button class="continue-btn" id="continueBtn">Continue</button>
        </div>
        <div class="login-prompt">
          New User? <a href="./404.html">Forgot password?</a>
        </div>
        <div class="login-prompt">
          New User? <a href="./signup.html">Sign Up</a>
        </div>

        <p class="terms-text">
          By continuing, you agree to our<br />
          <a href="./404.html">Terms of Service</a> &
          <a href="./404.html">Privacy Policy</a>
        </p>
      </div>

      <!-- Right Section -->
      <div class="right-section">
        <div class="illustration-container">
          <div class="illustration-circle"></div>
          <div class="phone-mockup"></div>
        </div>

        <h2 class="right-heading">Order faster &<br />easier everytime</h2>
        <p class="right-subtext">with the Stackly App</p>

        <div class="store-buttons">
          <a href="./404.html" class="store-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.61 3,21.09 3,20.5M16.81,15.12L18.77,14C20.54,13 21,12.3 21,12C21,11.7 20.54,11 18.77,10L16.81,8.88L14.75,12L16.81,15.12M4.88,22.29L15.69,16.12L14.12,13.75L4.88,22.29M14.12,10.25L15.69,7.88L4.88,1.71L14.12,10.25Z"
              />
            </svg>
            Play Store
          </a>
          <a href="./404.html" class="store-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M18.71,19.5C17.88,20.74 17,21.95 15.66,21.97C14.32,22 13.89,21.18 12.37,21.18C10.84,21.18 10.37,21.95 9.1,22C7.79,22.05 6.8,20.68 5.96,19.47C4.25,17 2.94,12.45 4.7,9.39C5.57,7.87 7.13,6.91 8.82,6.88C10.1,6.86 11.32,7.75 12.11,7.75C12.89,7.75 14.37,6.68 15.92,6.84C16.57,6.87 18.39,7.1 19.56,8.82C19.47,8.88 17.39,10.1 17.41,12.63C17.44,15.65 20.06,16.66 20.09,16.67C20.07,16.74 19.67,18.11 18.71,19.5M13,3.5C13.73,2.67 14.94,2.04 15.94,2C16.07,3.17 15.6,4.35 14.9,5.19C14.21,6.04 13.07,6.7 11.95,6.61C11.8,5.46 12.36,4.26 13,3.5Z"
              />
            </svg>
            App Store
          </a>
        </div>
      </div>
    </div>

    <script>
      const phoneInput = document.getElementById("phone");
      const passwordInput = document.getElementById("password");
      const continueBtn = document.getElementById("continueBtn");
      const errorMsg = document.getElementById("error-msg");

      // Filter non-numeric input for phone
      phoneInput.addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, "");
        if (e.target.value.length > 0) errorMsg.style.display = "none";
      });

      passwordInput.addEventListener("input", () => {
        errorMsg.style.display = "none";
      });

      continueBtn.addEventListener("click", () => {
        const isPhoneValid = phoneInput.value.length === 10;
        const isPasswordValid = passwordInput.value.trim().length >= 6;

        if (isPhoneValid && isPasswordValid) {
          continueBtn.disabled = true;
          continueBtn.style.opacity = "0.7";
          continueBtn.textContent = "Verifying...";

          // Mock redirection
          setTimeout(() => {
            window.location.href = "./404.html"; // or home.html
          }, 800);
        } else {
          errorMsg.textContent = !isPhoneValid
            ? "Please enter a valid 10-digit number"
            : "Password must be at least 6 characters";
          errorMsg.style.display = "block";

          // Small shake animation for error
          continueBtn.style.animation = "none";
          setTimeout(() => {
            continueBtn.style.animation = "shake 0.3s";
          }, 10);
        }
      });
    </script>
  </body>
</html>
