<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly - Professional Grocery Delivery</title>
    <style>
      :root {
        --purple-bg: linear-gradient(180deg, #5e0d8b 0%, #3a0b5a 100%);
        --pink-btn: #c81e61;
        --pink-hover: #b01a55;
        --text-white: #ffffff;
        --input-bg: #ffffff;
        --right-bg: #ffffff;
        --terms-link: #ff60a8;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --header-height: 70px;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        background-color: #f8f9fa;
      }

      body.menu-open {
        overflow: hidden;
      }

      /* --- Navbar Base --- */
      .navbar {
        background: var(--purple-bg);
        height: var(--header-height);
        display: flex;
        align-items: center;
        padding: 0 5%;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: var(--shadow);
      }

      .nav-container {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
      }

      /* --- Logo --- */
      .logo-container {
        flex-shrink: 0;
        z-index: 1002;
      }

      .logo-img {
        height: 36px;
        width: auto;
        display: block;
        min-width: 100px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      /* --- Search Bar --- */
      .search-container {
        flex: 1;
        max-width: 500px;
        position: relative;
        display: flex;
        align-items: center;
        z-index: 1001;
      }

      .search-input {
        width: 100%;
        padding: 10px 15px 10px 40px;
        border-radius: 25px;
        border: 2px solid transparent;
        outline: none;
        font-size: 0.9rem;
        transition: var(--transition);
        background: var(--input-bg);
      }

      .search-input:focus {
        border-color: var(--pink-btn);
        box-shadow: 0 0 8px rgba(200, 30, 97, 0.2);
      }

      .search-icon {
        position: absolute;
        left: 15px;
        width: 16px;
        height: 16px;
        fill: #777;
        pointer-events: none;
      }

      /* --- Icons --- */
      .nav-icon {
        width: 18px;
        height: 18px;
        margin-right: 8px;
        vertical-align: middle;
        fill: currentColor;
      }

      /* --- Desktop Menu Styling (Mobile First) --- */
      .nav-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100vh;
        background: var(--right-bg);
        display: flex;
        flex-direction: column;
        padding: 100px 40px;
        transition: var(--transition);
        z-index: 1001;
        overflow-y: auto;
      }

      .nav-menu.active {
        right: 0;
      }

      .nav-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .nav-link {
        text-decoration: none;
        color: #333;
        font-size: 1.1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        padding: 10px 0;
        transition: var(--transition);
        border-bottom: 1px solid #eee;
      }

      /* --- Dropdown Styling --- */
      .dropdown {
        position: relative;
      }

      .dropdown-toggle {
        cursor: pointer;
        justify-content: space-between;
      }

      .chevron-icon {
        width: 12px;
        height: 12px;
        transition: var(--transition);
      }

      .dropdown-menu {
        max-height: 0;
        overflow: hidden;
        list-style: none;
        background: #f9f9f9;
        transition: max-height 0.4s ease;
        padding-left: 20px;
      }

      .dropdown.active .dropdown-menu {
        max-height: 200px;
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .dropdown.active .chevron-icon {
        transform: rotate(180deg);
      }

      /* --- Cart Button --- */
      .cart-btn {
        background: var(--pink-btn);
        color: white !important;
        padding: 10px 20px !important;
        border-radius: 8px;
        justify-content: center;
        border-bottom: none !important;
        margin-top: 10px;
      }

      .cart-btn:hover {
        background: var(--pink-hover);
      }

      /* --- Hamburger --- */
      .hamburger {
        display: block;
        cursor: pointer;
        background: none;
        border: none;
        z-index: 1002;
        padding: 5px;
      }

      .bar {
        display: block;
        width: 25px;
        height: 3px;
        margin: 5px auto;
        transition: var(--transition);
        background-color: var(--text-white);
        border-radius: 2px;
      }

      .hamburger.active .bar:nth-child(2) {
        opacity: 0;
      }
      .hamburger.active .bar:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
        background-color: #333;
      }
      .hamburger.active .bar:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
        background-color: #333;
      }

      /* --- Overlay --- */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        opacity: 0;
        visibility: hidden;
        transition: var(--transition);
        z-index: 1000;
      }

      .overlay.active {
        opacity: 1;
        visibility: visible;
      }

      /* --- Desktop Media Query --- */
      @media (min-width: 1024px) {
        .hamburger {
          display: none;
        }

        .nav-menu {
          position: static;
          width: auto;
          height: auto;
          background: transparent;
          flex-direction: row;
          padding: 0;
          overflow: visible;
        }

        .nav-list {
          flex-direction: row;
          align-items: center;
          gap: 20px;
        }

        .nav-link {
          color: var(--text-white);
          font-size: 0.85rem;
          padding: 5px 0;
          border-bottom: none;
          position: relative;
        }

        /* Underline animation */
        .nav-link:not(.cart-btn)::after {
          content: "";
          position: absolute;
          bottom: -4px;
          left: 0;
          width: 0;
          height: 2px;
          background: var(--terms-link);
          transition: var(--transition);
        }

        .nav-link:not(.cart-btn):hover::after {
          width: 100%;
        }

        .nav-icon {
          fill: var(--text-white);
          width: 16px;
          height: 16px;
        }

        /* Desktop Dropdown */
        .dropdown-menu {
          position: absolute;
          top: 100%;
          left: 0;
          background: white;
          min-width: 180px;
          box-shadow: var(--shadow);
          border-radius: 8px;
          max-height: 0;
          opacity: 0;
          visibility: hidden;
          padding: 0;
          display: block;
          transform: translateY(10px);
          transition:
            opacity 0.3s,
            transform 0.3s,
            visibility 0.3s;
        }

        .dropdown:hover .dropdown-menu {
          max-height: 500px;
          opacity: 1;
          visibility: visible;
          transform: translateY(0);
          padding: 10px 0;
        }

        .dropdown-menu li a {
          color: #333;
          padding: 10px 20px;
          display: block;
          text-decoration: none;
          font-size: 0.9rem;
          transition: background 0.2s;
        }

        .dropdown-menu li a:hover {
          background: #f5f5f5;
          color: var(--pink-btn);
        }

        .cart-btn {
          margin-top: 0;
          font-weight: 600;
        }

        .cart-btn .nav-icon {
          fill: white;
        }
      }

      /* Section for testing scroll */
      .hero-spacer {
        height: 200vh;
        padding-top: 100px;
        text-align: center;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <nav class="navbar" role="navigation" aria-label="Main Navigation">
      <div class="nav-container">
        <!-- Logo -->

            <img

        <!-- Search Bar -->
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24">
            <path
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
            />
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search for groceries..."

        </div>

        <button
          class="hamburger"
          id="hamburger"
          aria-expanded="false"
          aria-controls="nav-menu"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <!-- Navigation Links -->
        <div class="nav-menu" id="nav-menu">
          <ul class="nav-list">
            <!-- Home Dropdown -->
            <li class="dropdown" id="home-dropdown">
              <a href="#" class="nav-link dropdown-toggle">
                <span>
                  <svg class="nav-icon" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                  </svg>
                  HOME
                </span>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                  <path d="M7 10l5 5 5-5z" />
                </svg>
              </a>
              <ul class="dropdown-menu">
                <li><a href="./index.html">HOME 1</a></li>
                <li><a href="./home2.html">HOME 2</a></li>
              </ul>
            </li>

            <li>
              <a href="./juice.html" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24">
                  <path

                <svg class="nav-icon" viewBox="0 0 24 24">

              <a href="./grocery.html" class="nav-link">

                  />
                </svg>

                    d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"

    <!-- <div class="hero-spacer">
      <h1>Welcome to Stackly</h1>
      <p>Responsive Navbar with Search. Try the mobile view!</p>
    </div> -->

    <script>
      const hamburger = document.getElementById("hamburger");
      const navMenu = document.getElementById("nav-menu");
      const overlay = document.getElementById("overlay");
      const body = document.body;
      const dropdown = document.getElementById("home-dropdown");
      const dropdownToggle = dropdown.querySelector(".dropdown-toggle");

      function toggleMenu() {
        const isOpen = navMenu.classList.contains("active");
        if (isOpen) {
          closeMenu();
        } else {
          openMenu();
        }
      }

      function openMenu() {
        hamburger.classList.add("active");
        navMenu.classList.add("active");
        overlay.classList.add("active");
        body.classList.add("menu-open");
        hamburger.setAttribute("aria-expanded", "true");
      }

      function closeMenu() {
        hamburger.classList.remove("active");
        navMenu.classList.remove("active");
        overlay.classList.remove("active");
        body.classList.remove("menu-open");
        hamburger.setAttribute("aria-expanded", "false");
        dropdown.classList.remove("active");
      }

      function handleDropdown(e) {
        if (window.innerWidth < 1024) {
          e.preventDefault();
          dropdown.classList.toggle("active");
        }
      }

      function handleOutsideClick(e) {
        if (
          navMenu.classList.contains("active") &&
          !navMenu.contains(e.target) &&
          !hamburger.contains(e.target)
        ) {
          closeMenu();
        }
      }

      hamburger.addEventListener("click", toggleMenu);
      overlay.addEventListener("click", closeMenu);
      dropdownToggle.addEventListener("click", handleDropdown);
      window.addEventListener("click", handleOutsideClick);

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeMenu();
        }
      });

      window.addEventListener("resize", () => {
        if (window.innerWidth >= 1024) {
          if (navMenu.classList.contains("active")) {
            closeMenu();
          }
        }
      });
    </script>
  </body>
</html>
