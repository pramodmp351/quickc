<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found | Stackly Grocery</title>
    <style>
      /* CSS RESET & VARIABLES */
      :root {
        --purple-bg: linear-gradient(180deg, #5e0d8b 0%, #3a0b5a 100%);
        --pink-btn: #c81e61;
        --pink-hover: #b01a55;
        --text-white: #ffffff;
        --input-bg: #ffffff;
        --right-bg: #f9f9f9;
        --terms-link: #ff60a8;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--purple-bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #333;
        overflow-x: hidden;
      }

      /* ANIMATIONS */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-15px) rotate(2deg);
        }
        100% {
          transform: translateY(0px) rotate(0deg);
        }
      }

      /* MAIN CONTAINER */
      .error-card {
        background-color: var(--input-bg);
        width: 100%;
        max-width: 500px;
        padding: 40px 24px;
        border-radius: 24px;
        box-shadow: var(--shadow);
        text-align: center;
        animation: fadeIn 0.8s ease-out forwards;
        position: relative;
      }

      /* ILLUSTRATION */
      .illustration-container {
        margin-bottom: 24px;
        animation: float 4s ease-in-out infinite;
        display: flex;
        justify-content: center;
      }

      .svg-icon {
        width: 160px;
        height: auto;
      }

      /* TYPOGRAPHY */
      .error-code {
        font-size: 80px;
        font-weight: 900;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #5e0d8b 0%, #c81e61 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }

      h1 {
        font-size: 24px;
        color: #1a1a1a;
        margin-bottom: 12px;
        font-weight: 700;
      }

      p {
        font-size: 16px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 32px;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
      }

      /* BUTTONS & LINKS */
      .btn-primary {
        display: inline-block;
        background-color: var(--pink-btn);
        color: var(--text-white);
        text-decoration: none;
        padding: 16px 32px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 16px;
        transition: var(--transition);
        box-shadow: 0 4px 15px rgba(200, 30, 97, 0.3);
        width: 100%;
        max-width: 240px;
        border: none;
        cursor: pointer;
        margin-bottom: 20px;
      }

      .btn-primary:hover {
        background-color: var(--pink-hover);
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(200, 30, 97, 0.4);
      }

      .btn-primary:active {
        transform: translateY(-1px);
      }

      .link-secondary {
        display: block;
        color: var(--terms-link);
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        transition: var(--transition);
      }

      .link-secondary:hover {
        text-decoration: underline;
        opacity: 0.8;
      }

      /* DESKTOP REFINEMENTS */
      @media (min-width: 768px) {
        .error-card {
          padding: 60px 48px;
        }

        .error-code {
          font-size: 100px;
        }

        h1 {
          font-size: 28px;
        }

        .illustration-container {
          margin-bottom: 32px;
        }

        .svg-icon {
          width: 180px;
        }
      }
    </style>
  </head>
  <body>
    <main class="error-card" role="main">
      <!-- DEAD ROBOT ILLUSTRATION -->
      <div class="illustration-container" aria-hidden="true">
        <svg
          class="svg-icon"
          viewBox="0 0 200 200"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Robot Head -->
          <rect
            x="50"
            y="60"
            width="100"
            height="80"
            rx="15"
            fill="#f0f0f0"
            stroke="#5e0d8b"
            stroke-width="4"
          />
          <!-- Antennas -->
          <line
            x1="100"
            y1="60"
            x2="100"
            y2="40"
            stroke="#5e0d8b"
            stroke-width="4"
            stroke-linecap="round"
          />
          <circle cx="100" cy="35" r="5" fill="#c81e61" />

          <!-- Dead Eyes (X) -->
          <g stroke="#5e0d8b" stroke-width="4" stroke-linecap="round">
            <!-- Left Eye -->
            <line x1="70" y1="85" x2="85" y2="100" />
            <line x1="85" y1="85" x2="70" y2="100" />
            <!-- Right Eye -->
            <line x1="115" y1="85" x2="130" y2="100" />
            <line x1="130" y1="85" x2="115" y2="100" />
          </g>

          <!-- Flat Mouth -->
          <line
            x1="80"
            y1="120"
            x2="120"
            y2="120"
            stroke="#5e0d8b"
            stroke-width="4"
            stroke-linecap="round"
          />

          <!-- Bolts/Details -->
          <circle cx="60" cy="125" r="3" fill="#c81e61" opacity="0.5" />
          <circle cx="140" cy="125" r="3" fill="#c81e61" opacity="0.5" />

          <!-- Small Floating "Glitch" Sparks -->
          <rect
            x="160"
            y="70"
            width="8"
            height="8"
            rx="2"
            fill="#ff60a8"
            opacity="0.6"
          >
            <animate
              attributeName="opacity"
              values="0;1;0"
              dur="2s"
              repeatCount="indefinite"
            />
          </rect>
          <circle cx="30" cy="100" r="4" fill="#5e0d8b" opacity="0.4">
            <animate
              attributeName="transform"
              attributeType="XML"
              type="translate"
              from="0,0"
              to="0,-20"
              dur="3s"
              repeatCount="indefinite"
            />
          </circle>
        </svg>
      </div>

      <div class="error-code">404</div>

      <h1>Oops! Page Not Found</h1>

      <p>The page you're looking for doesn't exist or has been moved.</p>

      <a
        href="./index.html"
        class="btn-primary"
        aria-label="Navigate back to home page"
      >
        Back to Home
      </a>

      <!-- <a
        href="login.html"
        class="link-secondary"
        aria-label="Navigate to login page"
      >
        Go to Login
      </a> -->
    </main>

    <script>
      window.addEventListener("load", () => {
        console.log("Stackly 404 Page Loaded with Dead Robot");
      });
    </script>
  </body>
</html>
